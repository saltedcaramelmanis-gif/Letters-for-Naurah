<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Ulang Tahun Naurah 🤍</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:linear-gradient(#FFF8FC,#FFEAF5);

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:25px;

overflow:hidden;

}

.card{

background:white;

max-width:850px;

width:100%;

padding:45px;

border-radius:30px;

box-shadow:0 12px 35px rgba(0,0,0,.08);

text-align:center;

}

h1{

font-size:42px;

color:#FF77AE;

margin-bottom:25px;

}

#typing{

font-size:21px;

line-height:1.9;

min-height:330px;

color:#555;

}

#openButton{

display:none;

margin-top:35px;

padding:17px 42px;

border:none;

border-radius:999px;

background:#FF77AE;

color:white;

font-size:19px;

cursor:pointer;

}

#garden{

display:none;

margin-top:40px;

font-size:45px;

line-height:2;

animation:fade 2s;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="card">

<h1>🐻 Momo</h1>

<p id="typing"></p>

<button

id="openButton">

Buka Surat 🤍

</button>

<div id="garden">

🌸 🌸 🌸 🌸 🌸

<br>

🌷 🌼 🌷 🌼 🌷

<br>

🌸 🌸 🌸 🌸 🌸

<br><br>

🎂

<br><br>

<h2 style="color:#FF77AE;">

Selamat Ulang Tahun, Naurah 🤍

</h2>

<p>

Semoga hari ini dipenuhi kebahagiaan,

kehangatan,

dan cinta dari orang-orang yang menyayangimu.

</p>

</div>

</div>

<script>

const texts=[

"Hari yang kutunggu akhirnya tiba. 🤍",

"Naurah...",

"Selamat ulang tahun.",

"Aku berhasil menjaga semua surat yang dititipkan kepadaku.",

"Hari ini...",

"Aku akan mengembalikannya kepadamu.",

"Semoga setiap kata di dalamnya membuatmu tersenyum. 🌸"

];

const typing=document.getElementById("typing");

const button=document.getElementById("openButton");

const garden=document.getElementById("garden");

let line=0;

let char=0;

function typeText(){

if(line>=texts.length){

button.style.display="inline-block";

return;

}

if(char<texts[line].length){

typing.innerHTML+=texts[line].charAt(char);

char++;

setTimeout(typeText,45);

}

else{

typing.innerHTML+="<br><br>";

line++;

char=0;

setTimeout(typeText,900);

}

}

typeText();

button.onclick=function(){

button.style.display="none";

typing.style.display="none";

garden.style.display="block";

}

</script>

</body>

</html>
