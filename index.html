<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Datang</title>

<style>

body{
margin:0;
background:#fff7fb;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
width:80%;
max-width:650px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

h1{
color:#ff6fa8;
}

#typing{
margin-top:25px;
font-size:20px;
line-height:1.8;
min-height:150px;
}

button{

display:none;

margin-top:30px;

padding:15px 35px;

border:none;

border-radius:30px;

background:#ff6fa8;

color:white;

font-size:18px;

cursor:pointer;

}

button:hover{

background:#ff4f93;

}

</style>

</head>

<body>

<div class="card">

<h1>🐻 Momo</h1>

<p id="typing"></p>

<button id="startBtn" onclick="location.href='intro.html'">
Titipkan Suratmu 🌸
</button>

</div>

<script>

const messages=[
"Halo...",
"Namaku Momo.",
"Aku penjaga surat.",
"Hari ini seseorang memintaku menjaga sesuatu yang sangat berharga.",
"Sebuah surat.",
"Mungkin...",
"Surat itu berasal darimu."
];

let line=0;

let char=0;

function type(){

if(line<messages.length){

if(char<messages[line].length){

document.getElementById("typing").innerHTML+=messages[line].charAt(char);

char++;

setTimeout(type,45);

}

else{

document.getElementById("typing").innerHTML+="<br><br>";

line++;

char=0;

setTimeout(type,900);

}

}

else{

document.getElementById("startBtn").style.display="inline-block";

}

}

type();

</script>

</body>

</html>
