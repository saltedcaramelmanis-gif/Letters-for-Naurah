<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Momo's Garden</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#FFF8FC;

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

padding:20px;

}

.card{

background:white;

width:100%;

max-width:700px;

padding:45px;

border-radius:28px;

box-shadow:0 10px 35px rgba(0,0,0,.08);

text-align:center;

}

h1{

color:#FF77AE;

margin-bottom:25px;

font-size:38px;

}

#typing{

font-size:21px;

line-height:1.9;

min-height:250px;

color:#555;

}

button{

display:none;

margin-top:35px;

padding:16px 38px;

border:none;

border-radius:999px;

background:#FF77AE;

color:white;

font-size:18px;

cursor:pointer;

transition:.25s;

}

button:hover{

background:#ff5f9d;

transform:scale(1.03);

}

</style>

</head>

<body>

<div class="card">

<h1>🐻 Momo</h1>

<p id="typing"></p>

<button id="startBtn">

Titipkan Suratmu 🌸

</button>

</div>

<script>

const texts=[

"Halo...",

"Namaku Momo.",

"Aku adalah penjaga surat.",

"Hari ini seseorang memintaku menjaga sesuatu yang sangat berharga.",

"Sebuah surat.",

"Mungkin...",

"Surat itu berasal darimu. 🤍"

];

const typing=document.getElementById("typing");

const button=document.getElementById("startBtn");

let line=0;

let char=0;

function typeText(){

if(line>=texts.length){

button.style.display="inline-block";

return;

}

if(char<texts[line].length){

typing.innerHTML+=texts[line].charAt(char);

char++;

setTimeout(typeText,45);

}

else{

typing.innerHTML+="<br><br>";

line++;

char=0;

setTimeout(typeText,850);

}

}

typeText();

button.onclick=function(){

window.location.href="intro.html";

}

</script>

</body>
</html>
