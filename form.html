<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Titipkan Surat</title>

<style>

body{
margin:0;
background:#fff7fb;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:80%;
max-width:700px;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

h1{
color:#ff6fa8;
}

#message{
font-size:20px;
line-height:1.8;
margin-bottom:25px;
min-height:170px;
}

input{
width:90%;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
font-size:16px;
}

button{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff6fa8;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>🐻 Momo</h1>

<p id="message">

Terima kasih ya... 🤍

<br><br>

Kalau boleh...

<br><br>

Sebelum aku menerima suratmu...

<br><br>

Boleh aku mengenalmu dulu?

</p>

<input
id="inputBox"
type="text"
placeholder="Nama panggilanmu">

<br>

<button onclick="nextStep()">
Lanjut 🤍
</button>

</div>

<script>

let step = 1;

let nama = "";

let judul = "";

let isi = "";

function nextStep(){

const message=document.getElementById("message");

const input=document.getElementById("inputBox");


// STEP 1

if(step===1){

nama=input.value.trim();

if(nama===""){

message.innerHTML=`
🐻

Maaf ya...

Aku belum bisa menerima surat ini.

Boleh tulis nama panggilanmu?

Aku ingin memastikan nanti Naurah tahu surat ini berasal dari siapa. 🤍
`;

input.focus();

return;

}

message.innerHTML=`

Senang berkenalan denganmu, ${nama}. 🤍

<br><br>

Terima kasih sudah mempercayaiku.

<br><br>

Aku akan menjadi penjaga suratmu sampai hari ulang tahun Naurah tiba.

<br><br>

Sekarang...

<br><br>

Boleh aku tahu judul suratmu?

`;

input.value="";

input.placeholder="Judul surat";

step=2;

return;

}


// STEP 2

if(step===2){

judul=input.value.trim();

if(judul===""){

message.innerHTML=`

🤍

Aku belum bisa menyimpan surat tanpa judul.

<br><br>

Boleh beri judul dulu supaya nanti Naurah tahu surat ini tentang apa?

`;

input.focus();

return;

}

message.innerHTML=`

Judul suratmu:

<br><br>

<b>${judul}</b>

<br><br>

Sekarang...

<br><br>

Silakan tuliskan isi suratmu.

`;

input.value="";

input.placeholder="Isi surat...";

step=3;

return;

}


// STEP 3

if(step===3){

isi=input.value.trim();

if(isi===""){

message.innerHTML=`

🤍

Suratmu masih kosong.

<br><br>

Aku ingin menyimpannya dengan baik.

<br><br>

Boleh tulis isi suratnya dulu?

`;

input.focus();

return;

}

message.innerHTML=`

🤍

Terima kasih, ${nama}.

<br><br>

Suratmu sudah kuterima.

<br><br>

Aku akan menjaganya sampai hari ulang tahun Naurah tiba. 🌸

`;

input.style.display="none";

document.querySelector("button").style.display="none";

step=4;

return;

}

}

</script>

</body>
</html>
