<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Titipkan Surat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#FFF8FC;

font-family:Arial,sans-serif;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:24px;

}

.card{

width:100%;
max-width:760px;

background:white;

padding:45px;

border-radius:28px;

box-shadow:0 12px 35px rgba(0,0,0,.08);

text-align:center;

}

h1{

font-size:38px;

color:#FF78AF;

margin-bottom:25px;

}

#message{

font-size:20px;

line-height:1.9;

color:#555;

min-height:240px;

margin-bottom:30px;

}

input,textarea{

width:100%;

padding:16px;

font-size:17px;

border:1px solid #ddd;

border-radius:18px;

outline:none;

margin-top:10px;

font-family:inherit;

}

textarea{

resize:none;

height:180px;

display:none;

}

input:focus,
textarea:focus{

border-color:#FF78AF;

}

#photoArea{

display:none;

margin-top:20px;

}

#preview{

display:none;

max-width:220px;

margin-top:20px;

border-radius:18px;

}

button{

margin-top:30px;

padding:16px 42px;

border:none;

border-radius:999px;

background:#FF78AF;

color:white;

font-size:18px;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:scale(1.03);

}

</style>

</head>

<body>

<div class="card">

<h1>🐻 Momo</h1>

<p id="message">

Terima kasih ya... 🤍

<br><br>

Kalau boleh...

<br><br>

Sebelum aku menerima suratmu...

<br><br>

Boleh aku mengenalmu dulu?

</p>

<input
id="inputBox"
type="text"
placeholder="Nama panggilanmu">

<textarea
id="textBox"
placeholder="Isi suratmu..."></textarea>

<div id="photoArea">

<p style="margin-bottom:15px;color:#666;">

Kalau ingin, kamu boleh menitipkan satu foto juga. 🤍

</p>

<input
type="file"
id="photoInput"
accept="image/*">

<img id="preview">

</div>

<button
id="nextButton">

Lanjut 🤍

</button>
</div>

<script>

let step = 1;

let nama = "";
let judul = "";
let isiSurat = "";
let foto = null;

const message = document.getElementById("message");
const input = document.getElementById("inputBox");
const textBox = document.getElementById("textBox");
const photoArea = document.getElementById("photoArea");
const photoInput = document.getElementById("photoInput");
const preview = document.getElementById("preview");
const nextButton = document.getElementById("nextButton");

photoInput.addEventListener("change", function(){

    if(this.files.length>0){

        foto = this.files[0];

        preview.src = URL.createObjectURL(foto);

        preview.style.display = "block";

    }

});

nextButton.addEventListener("click", nextStep);

function nextStep(){

// ======================
// STEP 1
// ======================

if(step===1){

nama = input.value.trim();

if(nama===""){

message.innerHTML=`

🐻

Maaf ya...

Aku belum bisa menerima surat ini.

<br><br>

Boleh tulis nama panggilanmu dulu?

`;

input.focus();

return;

}

message.innerHTML=`

Senang berkenalan denganmu,

<br><br>

<b>${nama}</b> 🤍

<br><br>

Terima kasih sudah mempercayaiku.

<br><br>

Sekarang...

<br><br>

Boleh aku tahu judul suratmu?

`;

input.value="";

input.placeholder="Judul surat";

step=2;

return;

}

// ======================
// STEP 2
// ======================

if(step===2){

judul=input.value.trim();

if(judul===""){

message.innerHTML=`

🤍

Aku belum bisa menyimpan surat tanpa judul.

<br><br>

Boleh beri judul dulu ya.

`;

input.focus();

return;

}

message.innerHTML=`

Judul suratmu

<br><br>

<b>${judul}</b>

<br><br>

Indah sekali.

<br><br>

Sekarang...

<br><br>

Tuliskan isi suratmu.

`;

input.style.display="none";

textBox.style.display="block";

textBox.value="";

step=3;

return;

}

// ======================
// STEP 3
// ======================

if(step===3){

isiSurat=textBox.value.trim();

if(isiSurat===""){

message.innerHTML=`

🤍

Suratmu masih kosong.

<br><br>

Aku ingin menjaganya dengan baik.

`;

textBox.focus();

return;

}

message.innerHTML=`

Aku sudah menerima isi suratmu.

🤍

Kalau kamu mau...

Kamu juga boleh menitipkan satu foto.

Ini opsional kok.

`;

textBox.style.display="none";

photoArea.style.display="block";

step=4;

return;

}

// ======================
// STEP 4
// ======================

if(step===4){

message.innerHTML=`

🤍

Sebelum aku menyimpannya...

Aku ingin memastikan semuanya sudah benar.

`;

photoArea.style.display="none";

message.innerHTML=`

<h3>Review Suratmu 🤍</h3>

<p><b>Nama</b></p>

<p>${nama}</p>

<br>

<p><b>Judul</b></p>

<p>${judul}</p>

<br>

<p><b>Isi Surat</b></p>

<p>${isiSurat.replace(/\n/g,"<br>")}</p>

${foto ? "<br><p>📷 Foto berhasil ditambahkan.</p>" : "<br><p>Tidak ada foto yang ditambahkan.</p>"}

<br><br>

Kalau semuanya sudah benar...

Tekan sekali lagi tombol <b>Lanjut 🤍</b>.

`;

step=5;

return;

}

// ======================
// STEP 5
// ======================

if(step===5){

message.innerHTML=`

🐻

Terima kasih ya, ${nama}. 🤍

<br><br>

Aku berjanji akan menjaga surat ini sebaik mungkin.

<br><br>

Semoga saat Naurah membacanya nanti...

Surat ini masih membawa perasaan hangat yang sama seperti hari ketika kamu menulisnya.

<br><br>

Sampai hari itu tiba...

Biarkan aku menjadi penjaganya. 🌸

`;

input.style.display="none";

textBox.style.display="none";

photoArea.style.display="none";

nextButton.innerHTML="Titipkan Surat 🤍";

step=6;

return;

}

// ======================
// STEP 6
// ======================

if(step===6){

window.location.href="waiting.html";

return;

}
}

</script>

</body>

</html>
