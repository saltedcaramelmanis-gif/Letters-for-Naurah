<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Titipkan Surat</title>

<style>

body{
margin:0;
background:#fff7fb;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:80%;
max-width:700px;
padding:40px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

h1{
color:#ff6fa8;
}

#message{
font-size:20px;
line-height:1.8;
margin-bottom:25px;
min-height:120px;
}

input{

width:90%;

padding:15px;

border-radius:15px;

border:1px solid #ddd;

font-size:16px;

}

button{

margin-top:25px;

padding:15px 35px;

border:none;

border-radius:30px;

background:#ff6fa8;

color:white;

font-size:18px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="card">

<h1>🐻 Momo</h1>

<p id="message">

Terima kasih ya... 🤍

<br><br>

Kalau boleh...

<br><br>

Sebelum aku menerima suratmu...

<br><br>

Boleh aku mengenalmu dulu?

</p>

<div id="formArea">

<input
id="inputBox"
type="text"
placeholder="Nama panggilanmu">

<br>

<button
onclick="nextStep()">

Lanjut 🤍

</button>

</div>

<script>

let step=1;
let nama="";
let judul="";

function nextStep(){

const message=document.getElementById("message");

const input=document.getElementById("inputBox");

if(step==1){
nama=input.value;
if(nama.trim()==""){

message.innerHTML=`
🐻

Maaf ya...

Aku belum bisa menerima surat ini.

Boleh tulis nama panggilanmu?

Aku ingin memastikan nanti Naurah tahu surat ini berasal dari siapa. 🤍
`;

input.focus();
return;

}

message.innerHTML = `
Senang berkenalan denganmu, ${nama}. 🤍

<br><br>

Terima kasih sudah mempercayaiku.

<br><br>

Aku akan menjadi penjaga suratmu sampai hari ulang tahun Naurah tiba.

<br><br>

Sekarang...

<br><br>

Boleh aku tahu judul suratmu?
`;

input.value="";

input.placeholder="Judul surat";

step=2;

}
if(step==2){

judul=input.value;

if(judul.trim()==""){

message.innerHTML=`
🤍

Aku belum bisa menyimpan surat tanpa judul.

Boleh beri judul dulu supaya nanti Naurah tahu surat ini tentang apa? ✨
`;

input.focus();
return;
}

message.innerHTML=`
Judul suratmu:

<b>${judul}</b>

🤍

Sekarang tuliskan isi suratmu.

Aku akan menjaganya sampai hari ulang tahun Naurah.
`;

input.value="";
input.placeholder="Isi surat...";
step=3;

if(step==3){

const isi = input.value;

if(isi.trim()==""){

message.innerHTML=`
🤍

Suratmu masih kosong.

Aku ingin menyimpannya dengan baik, jadi boleh tulis isi suratnya dulu? ✨
`;

input.focus();
return;
}

message.innerHTML=`
🤍

Suratmu berhasil kusimpan.

Judul:
<b>${judul}</b>

Isi surat:
${isi}

Aku akan menjaganya sampai hari ulang tahunmu. ✨
`;

input.value="";
input.disabled=true;
step=4;
}
}
}

}

</script>

</body>

</html>
