<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surat Kedua</title>

<style>

body{
margin:0;
font-family:Georgia,serif;
background:linear-gradient(180deg,#fffaf5,#ffe8ee);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:85%;
max-width:700px;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
line-height:1.9;
position:relative;
}

.card::before{
content:"🌸";
position:absolute;
font-size:40px;
top:15px;
right:20px;
}

h1{
text-align:center;
color:#ff7da6;
}

p{
font-size:18px;
}

button{
margin-top:30px;
padding:14px 28px;
border:none;
border-radius:50px;
background:#ff7da6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff5b90;
}

</style>

</head>

<body>

<div class="card">

<h1>💌 Surat Kedua</h1>

<p>
Untuk Naurah,
</p>

<p>
Kalau kamu sudah sampai di halaman ini,
berarti kamu memilih untuk terus membaca.
Terima kasih ya...
</p>

<p>
Ada banyak hal yang mungkin sulit diucapkan secara langsung,
makanya semuanya kutulis di sini.
</p>

<p id="typing"></p>

<button onclick="window.location.href='surat3.html'">
Lanjut Membaca 🤍
</button>

</div>

<script>

const text =
"Semoga setiap halaman yang kamu buka membuatmu merasa disayang, dihargai, dan diingat. 🤍";

let i = 0;

function typeWriter(){

if(i < text.length){

document.getElementById("typing").innerHTML += text.charAt(i);

i++;

setTimeout(typeWriter,45);

}

}

typeWriter();

</script>

</body>
</html>
